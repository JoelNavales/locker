name: locker
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.3
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  google_fonts: ^8.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/locker_icon_1024.png"
  adaptive_icon_background: "#FFFBEF"
  adaptive_icon_foreground: "assets/images/locker_mark_1024.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFBEF"
  image: assets/images/locker_mark_1024.png
  android_12:
    image: assets/images/locker_mark_1024.png
    color: "#FFFBEF"